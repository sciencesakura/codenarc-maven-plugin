name: build
on:
  pull_request:
    paths:
      - '.github/workflows/build.yaml'
      - '.java-version'
      - '.mvn/**'
      - 'config/**'
      - 'pom.xml'
      - 'src/**'
      - '!src/site/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yaml'
      - '.java-version'
      - '.mvn/**'
      - 'config/**'
      - 'pom.xml'
      - 'src/**'
      - '!src/site/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version-file: .java-version
          distribution: zulu
          cache: maven
      - run: ./mvnw -e --batch-mode clean integration-test -Dmaven.source.skip=true -Djacoco.skip=true
